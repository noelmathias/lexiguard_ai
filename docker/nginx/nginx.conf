# ── Rate limiting ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

# ── Upstream ─────────────────────────────────────────────────
upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (production) ──────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS in production
    # For local dev this block serves the API directly
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # SSL — certs mounted as volume on EC2
    # For local dev, comment out ssl_certificate lines
    # and change listen to 80
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10M;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin"         always;
    add_header X-XSS-Protection       "1; mode=block"         always;

    # ── API proxy ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout for LLM calls
        proxy_read_timeout    300s;
        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;
        proxy_buffering       off;
    }

    # ── Upload endpoint — stricter rate limit ────────────────
    location /api/upload {
        limit_req zone=upload burst=5 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # ── Frontend static (local dev only) ─────────────────────
    # On EC2, frontend is on Vercel — this block is unused
    location / {
        root  /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}