# Apply on top of docker-compose.yml:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: lexai

services:

  ollama:
    restart: always
    deploy:
      resources:
        limits:
          memory: 10G    # protect system RAM
        reservations:
          memory: 6G

  backend:
    restart: always
    environment:
      - DEBUG=False
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro           # Let's Encrypt certs
      - certbot_webroot:/var/www/certbot                # ACME challenge
    depends_on:
      backend:
        condition: service_healthy

  # ── Certbot for SSL renewal ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: lexai-certbot
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
      "
    networks:
      - lexai-net

volumes:
  certbot_webroot:
    name: lexai_certbot_webroot

networks:
  lexai-net:
    name: lexai-net