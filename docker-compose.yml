name: lexai

services:

  # ── Ollama LLM ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: lexai-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama          # persist downloaded models
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    networks:
      - lexai-net
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s    # model pull can take time

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexai-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - backend_uploads:/app/data/uploads    # user uploaded files
      - backend_index:/app/data/index        # FAISS index
      - backend_processed:/app/data/processed # chunks.json
      - backend_workspace:/app/data/workspace_chunks
      - backend_logs:/app/logs
      # Mount raw data so pipeline.py can read seed files
      - ./backend/data/raw:/app/data/raw:ro
    networks:
      - lexai-net
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # Build RAG index on first start if it doesn't exist
    command: >
      sh -c "
        if [ ! -f data/index/faiss.index ]; then
          echo 'Building RAG index for first time...';
          python data_pipeline/pipeline.py &&
          python -c \"from core.rag import rag_system; rag_system.initialise(force_rebuild=True)\";
          echo 'Index built.';
        fi;
        exec uvicorn main:app
          --host 0.0.0.0
          --port 8000
          --workers 1
          --log-level info
          --access-log
      "

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: lexai-nginx
    restart: unless-stopped
    ports:
      - "80:80"             # HTTP (local dev)
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lexai-net
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"  # for Vite dev server proxy

# ── Named Volumes ────────────────────────────────────────────
volumes:
  ollama_models:
    name: lexai_ollama_models
  backend_uploads:
    name: lexai_backend_uploads
  backend_index:
    name: lexai_backend_index
  backend_processed:
    name: lexai_backend_processed
  backend_workspace:
    name: lexai_backend_workspace
  backend_logs:
    name: lexai_backend_logs

# ── Network ──────────────────────────────────────────────────
networks:
  lexai-net:
    name: lexai-net
    driver: bridge
